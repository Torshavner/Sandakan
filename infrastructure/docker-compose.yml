services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sandakan}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sandakan}
      - POSTGRES_DB=${POSTGRES_DB:-sandakan}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandakan"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rag-network

  # PostgreSQL Admin Interface
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@sandakan.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
      - PGADMIN_CONFIG_ALLOW_SPECIAL_EMAIL_DOMAINS=['local']
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - rag-network

  # Vector Database Service
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      - "${QDRANT_REST_PORT:-6333}:6333"  # REST API & Dashboard
      - "${QDRANT_GRPC_PORT:-6334}:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - rag-network

  # Application Interface Service
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      - PORT=8080
      - WEBUI_AUTH=False
      - ENABLE_AUTOCOMPLETE_GENERATION=false
      # Vector DB Configuration
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://qdrant:6333
      # RAG Configuration
      - RAG_EMBEDDING_ENGINE=${RAG_EMBEDDING_ENGINE:-}
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-}
      # LLM Configuration (configure based on your setup)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-placeholder}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-http://host.docker.internal:8080/v1}
    volumes:
      - open_webui_data:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - rag-network

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki
    networks:
      - monitoring-net
    labels:
      - logging="true"


  vector:
    image: timberio/vector:latest-alpine
    container_name: vector
    command: --config /etc/vector/vector.toml
    ports:
      - "9000:9000/udp"
      - "8686:8686"
    volumes:
      - ./vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring-net
    labels:
      - logging="true"
    depends_on:
      - loki


  tempo:
    image: grafana/tempo:2.8.3
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo-config.yml"]
    ports:
      - "3200:3200"   # HTTP UI / query API
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    volumes:
      - ./tempo-config.yml:/etc/tempo/tempo-config.yml
      - tempo_data:/var/tempo
    networks:
      - monitoring-net
    labels:
      - logging="true"


  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    networks:
      - monitoring-net
      - rag-network
    labels:
      - logging="true"
    depends_on:
      - loki
      - tempo

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  qdrant_data:
    driver: local
  open_webui_data:
    driver: local
  grafanadata:
    driver: local
  loki_data:
    driver: local
  tempo_data:
    driver: local

networks:
  rag-network:
    driver: bridge
  monitoring-net:
    driver: bridge
